name: Deploy docs to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-docs-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20.x"
  PNPM_VERSION: "10.14.0"

jobs:
  build:
    name: Build VitePress
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm run docs:build

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: vitepress-dist
          path: docs/.vitepress/dist
          if-no-files-found: error

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
      APP_PORT: ${{ secrets.APP_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download built site
        uses: actions/download-artifact@v5
        with:
          name: vitepress-dist
          path: .deploy/dist

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload files
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$VPS_DEPLOY_PATH/docs/.vitepress/dist' '$VPS_DEPLOY_PATH/logs'"

          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -p ${VPS_PORT:-22}" \
            .deploy/dist/ \
            "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/docs/.vitepress/dist/"

          rsync -az -e "ssh -i ~/.ssh/deploy_key -p ${VPS_PORT:-22}" \
            ecosystem.config.cjs server.mjs package.json .env.example \
            "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/"

      - name: Reload PM2
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_DEPLOY_PATH' && PORT='${APP_PORT:-4173}' pm2 startOrReload ecosystem.config.cjs --env production && pm2 save"
